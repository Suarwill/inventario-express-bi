<div style="max-width: 1100px; margin: 20px auto; padding: 25px; background: #1a1d29; border-radius: 12px; color: #fff;">
    <h2 style="margin-top:0; margin-bottom:20px; font-size:20px; color:#ef4444;">📤 Egreso y Mermas de Productos</h2>
    
    <form id="form-salida-producto">
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap:15px; margin-bottom:25px; background:#0d0f14; padding:15px; border-radius:8px; border:1px solid #2e344d;">
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:14px;">Tipo Movimiento:</label>
                <select id="salida-tipo" style="width:100%; padding:10px; background:#1a1d29; border:1px solid #2e344d; color:#fff; border-radius:6px;">
                    <option value="MERMA">Merma (Pérdida / Daño)</option>
                    <option value="RETIRO">Retiro (Consumo Interno / Ajuste)</option>
                </select>
            </div>
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:14px;">Folio Interno:</label>
                <input type="text" id="salida-folio" readonly style="width:100%; padding:10px; background:#2e344d; border:1px solid #2e344d; color:#94a3b8; border-radius:6px; font-family:monospace;">
            </div>
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:14px;">Fecha Movimiento:</label>
                <input type="date" id="salida-fecha" style="width:100%; padding:10px; background:#1a1d29; border:1px solid #2e344d; color:#fff; border-radius:6px;">
            </div>
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:14px;">Descripción / Motivo:</label>
                <input type="text" id="salida-motivo" required placeholder="Ej: Producto vencido" style="width:100%; padding:10px; background:#1a1d29; border:1px solid #2e344d; color:#fff; border-radius:6px;">
            </div>
        </div>

        <div style="overflow-x:auto; margin-bottom:20px;">
            <table style="width:100%; border-collapse:collapse; text-align:left;">
                <thead>
                    <tr style="border-bottom:2px solid #2e344d; color:#94a3b8; font-size:14px;">
                        <th style="padding:10px; width:180px;">SKU / Código</th>
                        <th style="padding:10px;">Descripción</th>
                        <th style="padding:10px; width:100px; text-align:center;">Cantidad</th>
                        <th style="padding:10px; width:60px; text-align:center;">Acción</th>
                    </tr>
                </thead>
                <tbody id="contenedor-lineas-salidas"></tbody>
            </table>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; background:#0d0f14; padding:15px; border-radius:8px; border:1px solid #2e344d;">
            <button type="button" id="btn-agregar-fila-salida" style="background:#2563eb; color:#fff; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:bold;">+ Agregar Fila</button>
            <button type="submit" style="background:#ef4444; color:#fff; border:none; padding:10px 25px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:15px;">Procesar Salida</button>
        </div>
    </form>
</div>
