<div style="max-width: 1100px; margin: 20px auto; padding: 25px; background: var(--bg-paneles); border-radius: 12px; border: 1px solid var(--borde);">
    <h2 style="margin-top:0; margin-bottom:20px; font-size:20px; color: var(--texto-principal);">Egreso de productos y Mermas</h2>
    
    <form id="form-salida-producto">
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap:15px; margin-bottom:25px; background: var(--bg-interacciones); padding:15px; border-radius:8px; border: 1px solid var(--borde);">
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:14px; color: var(--texto-principal);">Tipo Movimiento:</label>
                <select id="salida-tipo" style="width:100%; padding:10px; background: var(--bg-principal); border: 1px solid var(--borde); color: var(--texto-principal); border-radius:6px;">
                    <option value="MERMA">Merma (Pérdida / Daño)</option>
                    <option value="RETIRO">Retiro (Consumo Interno / Ajuste)</option>
                </select>
            </div>
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:14px; color: var(--texto-principal);">Folio Interno:</label>
                <input type="text" id="salida-folio" readonly style="width:100%; padding:10px; background: var(--bg-campos); border: 1px solid var(--borde); color: var(--texto-secundario); border-radius:6px; font-family:monospace; font-weight:bold;">
            </div>
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:14px; color: var(--texto-principal);">Fecha Operación:</label>
                <input type="date" id="salida-fecha" style="width:100%; padding:10px; background: var(--bg-principal); border: 1px solid var(--borde); color: var(--texto-principal); border-radius:6px;">
            </div>
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:14px; color: var(--texto-principal);">Motivo / Justificación:</label>
                <input type="text" id="salida-motivo" required placeholder="Ej: Rotura de empaque en transporte" style="width:100%; padding:10px; background: var(--bg-principal); border: 1px solid var(--borde); color: var(--texto-principal); border-radius:6px;">
            </div>
        </div>

        <div style="overflow-x:auto; margin-bottom:20px;">
            <table style="width:100%; border-collapse:collapse; text-align:left;">
                <thead>
                    <tr style="border-bottom:2px solid var(--borde); color: var(--texto-secundario); font-size:14px;">
                        <th style="padding:10px; width:180px;">SKU / Código</th>
                        <th style="padding:10px;">Descripción</th>
                        <th style="padding:10px; width:100px; text-align:center;">Cantidad</th>
                        <th style="padding:10px; width:60px; text-align:center;">Acción</th>
                    </tr>
                </thead>
                <tbody id="contenedor-lineas-salidas"></tbody>
            </table>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; padding:15px; border-radius:8px; border: 1px solid var(--borde);">
            <button type="button" id="btn-agregar-fila-salida" style="background: var(--bg-interacciones); color: var(--texto-principal); border: 1px solid var(--borde); padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:bold;">+ Agregar Fila</button>
            <button type="submit" style="background: var(--exito); color: var(--texto-principal); border: 1px solid var(--borde); padding:12px 30px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:15px;"> Confirmar Salida</button>
        </div>
    </form>
</div>
