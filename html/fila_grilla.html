<td style="padding:8px 4px; text-align:center; vertical-align:middle;">
    <button type="button" class="btn-lupa-buscar" style="background: var(--bg-interacciones); border: 1px solid var(--borde); border-radius:4px; color: var(--texto-principal); cursor:pointer; padding:6px 8px; font-size:13px;">🔍</button>
</td>
<td style="padding:8px 4px;"><input type="text" class="linea-sku" required style="width:100%; padding:8px; background: var(--bg-principal); border: 1px solid var(--borde); color: var(--texto-principal); border-radius:4px; font-size:14px;"></td>
<td style="padding:8px 4px;"><input type="number" class="linea-cantidad" min=\"1\" value="1" required style="width:100%; padding:8px; background: var(--bg-principal); border: 1px solid var(--borde); color: var(--texto-principal); border-radius:4px; font-size:14px;"></td>
<td style="padding:8px 4px;"><input type="text" class="linea-descripcion" required style="width:100%; padding:8px; background: var(--bg-principal); border: 1px solid var(--borde); color: var(--texto-principal); border-radius:4px; font-size:14px;"></td>
<td style="padding:8px 4px;"><input type="text" class="linea-categoria" required style="width:100%; padding:8px; background: var(--bg-principal); border: 1px solid var(--borde); color: var(--texto-principal); border-radius:4px; font-size:14px;"></td>
<td style="padding:8px 4px;"><input type="text" class="linea-subcategoria" style="width:100%; padding:8px; background: var(--bg-principal); border: 1px solid var(--borde); color: var(--texto-principal); border-radius:4px; font-size:14px;"></td>
<td style="padding:8px 4px;"><input type="number" class="linea-unitario" min="0" value="0" required style="width:100%; padding:8px; background: var(--bg-principal); border: 1px solid var(--borde); color: var(--texto-principal); border-radius:4px; font-size:14px;"></td>
<td style="padding:8px 4px;"><input type="number" class="linea-neto" value="0" readonly style="width:100%; padding:8px; background: var(--bg-interacciones); border: 1px solid var(--borde); color: var(--texto-secundario); border-radius:4px; font-size:14px; font-weight:bold; text-align:right;"></td>
<td style="padding:8px 4px; text-align:center; vertical-align:middle;">
    <button type="button" class="btn-eliminar-fila" style="background:transparent; border:1px solid var(--alerta); color: var(--alerta); padding:6px 10px; border-radius:4px; cursor:pointer; font-weight:bold; font-size:13px;">✕</button>
</td>
