<td style="padding: 10px; width: 180px;">
    <div style="display: flex; gap: 5px;">
        <button type="button" class="btn-lupa-buscar" style="background: var(--bg-interacciones); color: var(--texto-principal); border: 1px solid var(--borde); padding: 6px 10px; border-radius: 4px; cursor: pointer;">🔍</button>
        <input type="text" class="linea-sku" placeholder="SKU" style="width: 100%; padding: 6px; background: var(--bg-principal); border: 1px solid var(--borde); color: var(--texto-principal); border-radius: 4px; font-family: monospace;">
    </div>
</td>
<td style="padding: 10px;">
    <input type="text" class="linea-descripcion" placeholder="Descripción del producto" readonly style="width: 100%; padding: 6px; background: var(--bg-campos); border: 1px solid var(--borde); color: var(--texto-secundario); border-radius: 4px;">
</td>
<td style="padding: 10px; width: 100px;">
    <input type="number" class="linea-cantidad" value="1" min="1" style="width: 100%; padding: 6px; background: var(--bg-principal); border: 1px solid var(--borde); color: var(--texto-principal); border-radius: 4px; text-align: center;">
</td>
<td style="padding: 10px; width: 60px; text-align: center;">
    <button type="button" class="btn-eliminar-fila" style="background: transparent; color: var(--alerta); border: 1px solid var(--alerta); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold;">✕</button>
</td>
