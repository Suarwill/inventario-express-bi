<template id="template-apertura">
    <div style="max-width: 600px; margin: 20px auto; padding: 25px; background: var(--bg-paneles); border-radius: 12px; border: 1px solid var(--borde); color: var(--texto-principal); box-shadow: 0 4px 10px var(--sombra);">
        <h2 style="margin-top: 0; margin-bottom: 15px; font-size: 20px; color: var(--accent); border-bottom: 2px solid var(--borde); padding-bottom: 10px;">
            🔒 Apertura de Caja
        </h2>
        <p style="color: var(--texto-secundario); font-size: 14px; line-height: 1.5;">
            La caja se encuentra actualmente cerrada. Ingrese el saldo inicial en efectivo para iniciar el turno de trabajo de forma correcta.
        </p>
        <div style="margin-top: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: var(--texto-secundario);">
                Monto Inicial de Apertura ($):
            </label>
            <input type="number" id="monto-apertura-input" value="0" min="0" 
                   style="width: 100%; padding: 12px; background: var(--bg-campos); border: 1px solid var(--borde); color: var(--texto-oscuro); border-radius: 6px; font-size: 16px; font-weight: bold; font-family: monospace;">
        </div>
        <div style="margin-top: 25px; text-align: right;">
            <button type="button" id="btn-ejecutar-apertura" 
                    style="background: var(--exito); color: #fff; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px;">
                Abrir Caja
            </button>
        </div>
    </div>
</template>

<template id="template-monitoreo">
    <div style="max-width: 800px; margin: 20px auto; padding: 25px; background: var(--bg-paneles); border-radius: 12px; border: 1px solid var(--borde); color: var(--texto-principal); box-shadow: 0 4px 10px var(--sombra);">
        
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--borde); padding-bottom: 15px; margin-bottom: 20px;">
            <h2 style="margin: 0; font-size: 20px; color: var(--accent);">🟢 Turno de Caja Activo</h2>
            <button type="button" id="btn-actualizar-calculos" 
                    style="background: var(--bg-interacciones); color: var(--texto-principal); border: 1px solid var(--borde); padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer;">
                🔄 Recalcular
            </button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
            <div style="background: var(--bg-interacciones); padding: 15px; border-radius: 8px; border: 1px solid var(--borde);">
                <span style="display: block; font-size: 13px; color: var(--texto-secundario); text-transform: uppercase; letter-spacing: 0.5px;">Efectivo Esperado en Caja</span>
                <strong id="calc-efectivo" style="display: block; font-size: 24px; color: var(--alerta); margin-top: 5px; font-family: monospace;">$0</strong>
                <small style="display: block; color: var(--texto-principal); margin-top: 4px; font-size: 11px;">(Monto apertura + ventas en efectivo)</small>
            </div>
            <div style="background: var(--bg-interacciones); padding: 15px; border-radius: 8px; border: 1px solid var(--borde);">
                <span style="display: block; font-size: 13px; color: var(--texto-secundario); text-transform: uppercase; letter-spacing: 0.5px;">Ventas Electrónicas</span>
                <strong id="calc-electronico" style="display: block; font-size: 24px; color: var(--exito); margin-top: 5px; font-family: monospace;">$0</strong>
                <small style="display: block; color: var(--texto-principal); margin-top: 4px; font-size: 11px;">(Tarjetas + transferencias registradas)</small>
            </div>
        </div>

        <div style="background: var(--bg-interacciones); padding: 20px; border-radius: 8px; border: 1px solid var(--texto-oscuro); margin-top: 20px;">
            <h3 style="margin-top: 0; margin-bottom: 15px; font-size: 16px; color: var(--alerta);">🔒 Proceso de arqueo de caja</h3>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 400px;">
                <label style="font-weight: bold; font-size: 14px; color: var(--texto-secundario);">
                    Efectivo Real ($):
                </label>
                <input type="number" id="monto-cierre-input" value="0" min="0" 
                       style="width: 100%; padding: 10px; background: var(--bg-paneles); border: 1px solid var(--borde); color: var(--texto-principal); border-radius: 6px; font-size: 16px; font-weight: bold; font-family: monospace;">
            </div>

            <div style="margin-top: 20px; border-top: 1px solid var(--borde); padding-top: 15px; text-align: right;">
                <button type="button" id="btn-ejecutar-cierre" 
                        style="background: var(--alerta); color: #fff; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px;">
                    Cerrar caja
                </button>
            </div>
        </div>
    </div>
</template>
