<div style="max-width: 1100px; margin: 20px auto; padding: 25px; background-color: var(--bg-paneles); border-radius: 12px; border: 1px solid var(--borde);">
    <h2 style="margin-top:0; margin-bottom:20px; font-size:20px; color: var(--texto-principal);">Ingreso de productos / compras</h2>
    
    <form id="form-ingreso-producto">
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap:15px; margin-bottom:25px; background: var(--bg-interacciones); padding:15px; border-radius:8px; border: 1px solid var(--borde);">
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:14px; color: var(--texto-principal);">Tipo Documento:</label>
                <select id="ingreso-tipo" style="width:100%; padding:10px; background: var(--bg-principal); border: 1px solid var(--borde); color: var(--texto-principal); border-radius:6px;">
                    <option value="FACTURA">Factura (FE)</option>
                    <option value="BOLETA">Boleta (BE)</option>
                    <option value="ENTRADA">Entrada Simple / Ajuste (EB)</option>
                </select>
            </div>
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:14px; color: var(--texto-principal);">Fecha Movimiento:</label>
                <input type="date" id="ingreso-fecha" style="width:100%; padding:10px; background: var(--bg-principal); border: 1px solid var(--borde); color: var(--texto-principal); border-radius:6px;">
            </div>
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:14px; color: var(--texto-principal);">Folio Documento:</label>
                <input type="text" id="ingreso-folio" placeholder="Ej: 1024" required style="width:100%; padding:10px; background: var(--bg-principal); border: 1px solid var(--borde); color: var(--texto-principal); border-radius:6px;">
            </div>
            <div>
                <label id="label-origen" style="display:block; margin-bottom:5px; font-weight:bold; font-size:14px; color: var(--texto-principal);">Proveedor / Origen:</label>
                <input type="text" id="ingreso-origen" required placeholder="Ej: Distribuidora Central" style="width:100%; padding:10px; background: var(--bg-principal); border: 1px solid var(--borde); color: var(--texto-principal); border-radius:6px;">
            </div>
        </div>

        <div style="overflow-x:auto; margin-bottom:20px;">
            <table style="width:100%; border-collapse:collapse; min-width:950px;" id="tabla-lineas-abastecimiento">
                <thead>
                    <tr style="border-bottom:2px solid var(--borde); text-align:left; color: var(--texto-secundario); font-size:14px;">
                        <th style="padding:10px; width:5%; text-align:center;">🔍</th>
                        <th style="padding:10px; width:14%;">SKU</th>
                        <th style="padding:10px; width:8%;">Cant.</th>
                        <th style="padding:10px; width:21%;">Descripción</th>
                        <th style="padding:10px; width:13%;">Categoría</th>
                        <th style="padding:10px; width:13%;">Subcat.</th>
                        <th style="padding:10px; width:12%;">P. Unitario ($)</th>
                        <th style="padding:10px; width:11%;">P. Neto ($)</th>
                        <th style="padding:10px; width:5%; text-align:center;">Acción</th>
                    </tr>
                </thead>
                <tbody id="contenedor-lineas-productos"></tbody>
            </table>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-top:20px; padding-top:20px; border-top:1px solid var(--borde);">
            <div>
                <button type="button" id="btn-agregar-fila" style="background: var(--bg-interacciones); color: var(--texto-principal); border:1px solid var(--borde); padding:10px 15px; border-radius:6px; font-weight:bold; cursor:pointer;">➕ Agregar Fila</button>
            </div>
            <div style="width:300px; background: var(--bg-interacciones); padding:15px; border-radius:8px; border: 1px solid var(--borde); font-size:15px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span style="color: var(--texto-secundario);">Total Neto:</span>
                    <span id="resumen-neto" style="font-weight:bold; color: var(--texto-principal);">$0</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span style="color: var(--texto-secundario);">IVA (19%):</span>
                    <span id="resumen-iva" style="font-weight:bold; color: var(--texto-principal);">$0</span>
                </div>
                <div style="display:flex; justify-content:space-between; border-top:1px solid var(--borde); padding-top:8px; font-size:18px;">
                    <span style="color: var(--texto-secundario); font-weight:bold;">Total Final:</span>
                    <span id="resumen-total" style="color: var(--texto-secundario); font-weight:bold;">$0</span>
                </div>
            </div>
        </div>

        <button type="submit" style="width:100%; margin-top:25px; background: var(--exito); color: var(--texto-principal); padding:14px; border: 1px solid var(--borde); border-radius:6px; font-weight:bold; font-size:16px; cursor:pointer;">💾 Procesar Ingreso a Stock</button>
    </form>
</div>
